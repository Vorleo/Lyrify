name: Build Laneify APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Lyrify source
        run: git clone https://github.com/janjanmedinaaa/lyrify.git source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create properties files
        run: |
          cat > source/keys.properties << EOF
          storeFile=debug
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          compileSdkVersion=34
          spotifyClientId=0035cbcaad9e48fda1a24aedb6b66857
          EOF
          cp source/keys.properties source/keystore.properties

      - name: Rename app to Laneify
        run: |
          find source/app/src/main/res -name "strings.xml" -exec sed -i 's/>Lyrify</>Laneify</g' {} +
          find source/app/src/main/res -name "*.xml" -exec sed -i 's/name="app_name">Lyrify/name="app_name">Laneify/g' {} +

      - name: Inject Spotify Client ID
        run: |
          find source/app/src -name "*.kt" -o -name "*.java" | xargs grep -rl "spotifyClientId\|CLIENT_ID\|clientId" | while read f; do
            sed -i 's/spotifyClientId = ".*"/spotifyClientId = "0035cbcaad9e48fda1a24aedb6b66857"/g' "$f"
            sed -i 's/CLIENT_ID = ".*"/CLIENT_ID = "0035cbcaad9e48fda1a24aedb6b66857"/g' "$f"
          done

      - name: Replace lyrics API with LRCLIB
        run: |
          cat > source/app/src/main/java/com/medina/juanantonio/lyrify/data/LrclibApi.kt << 'EOF'
          package com.medina.juanantonio.lyrify.data

          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          import org.json.JSONObject
          import java.net.URL
          import java.net.URLEncoder

          object LrclibApi {
              suspend fun getSyncedLyrics(title: String, artist: String): List<Pair<Long, String>> = withContext(Dispatchers.IO) {
                  try {
                      val encodedTitle = URLEncoder.encode(title, "UTF-8")
                      val encodedArtist = URLEncoder.encode(artist, "UTF-8")
                      val url = "https://lrclib.net/api/get?track_name=$encodedTitle&artist_name=$encodedArtist"
                      val response = URL(url).readText()
                      val json = JSONObject(response)
                      val syncedLyrics = json.optString("syncedLyrics", "")
                      if (syncedLyrics.isEmpty()) return@withContext emptyList()
                      parseLrc(syncedLyrics)
                  } catch (e: Exception) {
                      emptyList()
                  }
              }

              private fun parseLrc(lrc: String): List<Pair<Long, String>> {
                  val lines = mutableListOf<Pair<Long, String>>()
                  val regex = Regex("""\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)""")
                  for (line in lrc.lines()) {
                      val match = regex.find(line) ?: continue
                      val (min, sec, ms, text) = match.destructured
                      val timeMs = min.toLong() * 60000 + sec.toLong() * 1000 + ms.toLong().let {
                          if (ms.length == 2) it * 10 else it
                      }
                      lines.add(Pair(timeMs, text.trim()))
                  }
                  return lines
              }
          }
          EOF

      - name: Make gradlew executable
        run: chmod +x source/gradlew

      - name: Print SHA-1
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep SHA1

      - name: Build debug APK
        run: |
          cd source
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Laneify
          path: source/app/build/outputs/apk/debug/*.apk
