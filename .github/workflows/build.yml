name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone original Lyrify source
        run: git clone https://github.com/janjanmedinaaa/lyrify.git source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create properties files
        run: |
          cat > source/keys.properties << EOF
          storeFile=debug
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          compileSdkVersion=34
          spotifyClientId=0035cbcaad9e48fda1a24aedb6b66857
          EOF
          cp source/keys.properties source/keystore.properties

      - name: Make gradlew executable
        run: chmod +x source/gradlew

      - name: Build debug APK
        run: |
          cd source
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrify
          path: source/app/build/outputs/apk/debug/*.apk
