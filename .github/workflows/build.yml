name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone original Lyrify source
        run: git clone https://github.com/janjanmedinaaa/lyrify.git source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create properties files
        run: |
          cat > source/keys.properties << EOF
          storeFile=debug
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          compileSdkVersion=34
          EOF
          cp source/keys.properties source/keystore.properties

      - name: Inject Spotify Client ID
        run: |
          find source -name "*.kt" -o -name "*.java" | xargs grep -l "CLIENT_ID\|client_id\|clientId\|SPOTIFY" | head -5
          grep -rn "CLIENT_ID\|client_id\|clientId\|SPOTIFY_CLIENT" source/app/src --include="*.kt" --include="*.java" || true

      - name: Replace Client ID in source
        run: |
          find source/app/src -type f \( -name "*.kt" -o -name "*.java" \) -exec sed -i 's/BuildConfig\.SPOTIFY_CLIENT_ID\|"YOUR_CLIENT_ID"\|"null"\|clientId = ""/clientId = "0035cbcaad9e48fda1a24aedb6b66857"/g' {} +

      - name: Make gradlew executable
        run: chmod +x source/gradlew

      - name: Build debug APK
        run: |
          cd source
          ./gradlew assembleDebug -PSPOTIFY_CLIENT_ID="0035cbcaad9e48fda1a24aedb6b66857"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrify
          path: source/app/build/outputs/apk/debug/*.apk
