name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip source
        run: unzip lyrify-master.zip -d source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x source/lyrify-master/gradlew

      - name: Build debug APK
        run: |
          cd source/lyrify-master
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lyrify-debug
          path: source/lyrify-master/app/build/outputs/apk/debug/*.apk
